name: Go CI

on:
  pull_request

env:
  GO_VERSION: "1.26.2"
  ACTIONS_STEP_DEBUG: true

jobs:
  ci:
    runs-on: self-hosted
    timeout-minutes: 25
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Ensure branch is up-to-date with main
        run: |
          set -e
          git fetch origin
          BRANCH="${GITHUB_HEAD_REF:-$(git rev-parse --abbrev-ref HEAD)}"
          if git log origin/main ^origin/"$BRANCH" --oneline | grep .; then
            echo "Some commits from origin/main are missing in origin/$BRANCH"
            exit 1
          else
            echo "All commits from origin/main are included in origin/$BRANCH"
          fi
      - name: Check for YAML and Test changes
        run: |
          CHANGES=$(git diff --minimal --name-only origin/main...@ | grep -E '(pull_request_template\.md|\.golangci\.yaml|ci\.yaml|integration_test\.go|update\.go|metadata\.json|Taskfile\.yml)$' | wc -l)
          if [ "$CHANGES" -ne 0 ]; then
            echo "Changes detected in YAML or Test files: $CHANGES files changed."
            exit 1
          else
            echo "No changes in YAML or Test Go files."
          fi
      - name: Check that generated code was not committed
        shell: bash
        run: |
          set -euo pipefail
          generated_count="$(find . -type f \
            \( -iname "*.pb.go" -o -iname "*.pb.gw.go" -o -iname "*.pb.validate.go" -o -iname "*.grpc.pb.go" \) \
            ! -path "./integration-tests/*" | wc -l | tr -d '[:space:]')"

          if [[ "$generated_count" -ne 0 ]]; then
            echo "Generated files must not be committed to the repository."
            exit 1
          fi
      - name: Check description
        run: |
          shopt -s extglob
          hours=$(echo "${{ github.event.pull_request.body }}" | sed -n 3p | tr -d '[:space:]')
          if [[ "$hours" == +([[:digit:]]) ]]; then
            echo "Hours: $hours"
          else
            echo "Please include the number of hours spent in the pull request description."
            echo "Ensure the third line of the PR description contains exactly one numerical value."
            echo "After correcting the issue, please push your changes to the branch."
            exit 1
          fi
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Setup task
        run: go install github.com/go-task/task/v3/cmd/task@latest
      - name: Generate code
        env:
          COURSE_CI_TOKEN: ${{ secrets.THE_NATURE_OF_MICROSERVICES_C5 }}
        run: |
          BRANCH="${GITHUB_HEAD_REF:-$(git rev-parse --abbrev-ref HEAD)}"
          task force-update hw="$BRANCH"
          task generate
      - name: Run coverage for cart
        id: coverage_cart
        uses: gwatts/go-coverage-action@v2
        with:
          working-directory: cart
          notes-ref: gocoverage-cart
          fail-coverage: always
          test-pkgs: ./...
          cover-pkg: ./...
          cover-mode: count
          coverage-threshold: 60
          add-comment: false
          ignore-pattern: |
            \.pb\.go$
            \.pb\.gw\.go$
            \.pb\.validate\.go$
            \.json$
            _mock\.go$
            _minimock\.go$
            /pkg/
            ^cmd/
            /internal/app/
      - name: Run coverage for loms
        id: coverage_loms
        uses: gwatts/go-coverage-action@v2
        with:
          working-directory: loms
          notes-ref: gocoverage-loms
          fail-coverage: always
          test-pkgs: ./...
          cover-pkg: ./...
          cover-mode: count
          coverage-threshold: 60
          add-comment: false
          ignore-pattern: |
            \.pb\.go$
            \.pb\.gw\.go$
            \.pb\.validate\.go$
            \.json$
            _mock\.go$
            _minimock\.go$
            /pkg/
            ^cmd/
            /internal/app/
      - name: Run coverage for notifications
        id: coverage_notifications
        uses: gwatts/go-coverage-action@v2
        with:
          working-directory: notifications
          notes-ref: gocoverage-notifications
          fail-coverage: always
          test-pkgs: ./...
          cover-pkg: ./...
          cover-mode: count
          coverage-threshold: 60
          add-comment: false
          ignore-pattern: |
            \.pb\.go$
            \.pb\.gw\.go$
            \.pb\.validate\.go$
            \.json$
            _mock\.go$
            _minimock\.go$
            /pkg/
            ^cmd/
            /internal/app/
      - name: Run linter
        run: |
          task lint
      - name: Generate project
        shell: bash
        run: |
          set -euo pipefail
          UNIQUE_ID="$(echo "${GITHUB_RUN_ID}_$(openssl rand -hex 6)" | shasum -a 256 | cut -c1-12)"
          REPO_NAME="$(basename "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '_')"
          echo "COMPOSE_PROJECT_NAME=${REPO_NAME}_${UNIQUE_ID}" >> "$GITHUB_ENV"
          echo "Using COMPOSE_PROJECT_NAME=${REPO_NAME}_${UNIQUE_ID}"
      - name: Run integration tests
        shell: bash
        run: |
          set -euo pipefail
          docker-compose \
          -f docker-compose.ci.yml \
          -f docker-compose.test.yml \
          up --build \
          --abort-on-container-exit \
          --exit-code-from integration-tests
      - name: Cleanup
        if: always()
        shell: bash
        run: |
          docker-compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            down -v --remove-orphans || true
          docker builder prune --filter "until=24h" -af || true
